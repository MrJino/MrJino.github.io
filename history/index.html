<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>히스토리</title>
    <link rel="stylesheet" href="../assets/css/tailwind.css" />
    <script src="../assets/components/navigation-dropdown.js" defer></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      .timeline-item {
        position: relative;
        padding-left: 3rem;
        padding-bottom: 3rem;
      }
      .timeline-item:last-child {
        padding-bottom: 0;
      }
      .timeline-line {
        position: absolute;
        left: 1.25rem;
        top: 0;
        bottom: 0;
        width: 2px;
        background: linear-gradient(to bottom, #333333, #666666);
      }
      .timeline-dot {
        position: absolute;
        left: 0.75rem;
        top: 0.5rem;
        width: 1rem;
        height: 1rem;
        background: #000000;
        border-radius: 50%;
        border: 3px solid #ffffff;
        box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
        z-index: 1;
      }
      .timeline-icon {
        position: absolute;
        left: 0;
        top: 2.5rem;
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 50%;
        border: 3px solid #000000;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        z-index: 2;
      }
      .history-card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        transition: all 0.3s ease;
      }
      .history-card:hover {
        border-color: #9ca3af;
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      .tab-button {
        padding: 0.5rem 1.5rem;
        border-radius: 0.5rem;
        transition: all 0.3s ease;
        cursor: pointer;
        color: #6b7280;
        font-weight: 500;
        border: 1px solid transparent;
      }
      .tab-button.active {
        background-color: #f3f4f6;
        border-color: #e5e7eb;
        font-weight: 600;
        color: #000000;
      }
      .tab-button:hover {
        background-color: #f9fafb;
      }
      .history-section {
        display: none;
      }
      .history-section.active {
        display: block;
      }
      .content-wrapper {
        height: calc(100vh - 64px);
        margin-top: 64px;
        overflow-y: auto;
      }
      .dropdown {
        position: relative;
      }
      .dropdown-menu {
        display: none;
        position: absolute;
        right: 0;
        top: 100%;
        margin-top: 0.5rem;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 100%;
        z-index: 100;
      }
      .dropdown-menu.show {
        display: block;
      }
      .dropdown-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        color: #374151;
        text-decoration: none;
        transition: background-color 0.2s;
      }
      .dropdown-item:hover {
        background-color: #f3f4f6;
      }
      .dropdown-item:first-child {
        border-radius: 0.5rem 0.5rem 0 0;
      }
      .dropdown-item:last-child {
        border-radius: 0 0 0.5rem 0.5rem;
      }

      @media (max-width: 768px) {
        nav .container {
          padding-left: 0.5rem;
          padding-right: 0.5rem;
          padding-top: 0.5rem;
          padding-bottom: 0.5rem;
        }

        .history-tabs {
          gap: 0.25rem;
        }

        .tab-button {
          padding: 0.375rem 0.625rem;
        }
      }
    </style>
  </head>
  <body class="bg-white text-gray-900">
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-200">
      <div class="container mx-auto px-6 py-3">
        <div class="flex items-center gap-2">
          <img src="../portfolio/res/jino_icon.png" alt="프로필 아이콘" class="w-8 h-8 rounded-lg object-contain flex-shrink-0" />
          <a href="../index.html" class="text-xl font-bold text-gray-950 hover:text-black transition-colors">MrJino</a>
          <div class="flex-1"></div>
          <div class="flex gap-6 items-center">
            <!-- Tab Buttons -->
            <div class="history-tabs flex items-center gap-2">
              <button class="tab-button active" onclick="switchTab('company')">회사</button>
              <button class="tab-button" onclick="switchTab('family')">가족</button>
              <button class="tab-button" onclick="switchTab('friends')">친구</button>
            </div>

            <!-- Navigation Dropdown -->
            <div id="navigationDropdown" data-current="history"></div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
      <div class="container mx-auto px-6 py-12">
        <div class="max-w-4xl mx-auto">
          <!-- 회사 히스토리 -->
          <div id="company" class="history-section active">
            <div class="relative">
              <!-- Timeline Item 1 -->
              <div class="timeline-item">
                <div class="timeline-line"></div>
                <div class="timeline-dot"></div>
                <div class="timeline-icon">🎓</div>

                <div class="history-card rounded-xl p-6 ml-8">
                  <div class="flex items-center justify-between mb-3">
                    <h3 class="text-xl font-bold text-gray-900">입학</h3>
                    <span class="text-sm text-gray-500">3개월전</span>
                  </div>
                  <p class="text-gray-700 leading-relaxed mb-4">안녕하세요.</p>
                </div>
              </div>
            </div>
          </div>

          <!-- 가족 히스토리 -->
          <div id="family" class="history-section">
            <div class="relative">
              <!-- Timeline Item 1 -->
              <div class="timeline-item">
                <div class="timeline-line"></div>
                <div class="timeline-dot"></div>
                <div class="timeline-icon">👶</div>

                <div class="history-card rounded-xl p-6 ml-8">
                  <div class="flex items-center justify-between mb-3">
                    <h3 class="text-xl font-bold text-gray-900">가족이야기</h3>
                    <span class="text-sm text-gray-500">5년전</span>
                  </div>
                  <p class="text-gray-700 leading-relaxed mb-4">가족이야기</p>
                </div>
              </div>
            </div>
          </div>

          <!-- 친구 히스토리 -->
          <div id="friends" class="history-section">
            <div class="relative">
              <!-- Timeline Item 1 -->
              <div class="timeline-item">
                <div class="timeline-line"></div>
                <div class="timeline-dot"></div>
                <div class="timeline-icon">🎉</div>

                <div class="history-card rounded-xl p-6 ml-8">
                  <div class="flex items-center justify-between mb-3">
                    <h3 class="text-xl font-bold text-gray-900">친구이야기</h3>
                    <span class="text-sm text-gray-500">1개월전</span>
                  </div>
                  <p class="text-gray-700 leading-relaxed mb-4">친구이야기</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function switchTab(category) {
        // 모든 탭 버튼에서 active 제거
        document.querySelectorAll('.tab-button').forEach((btn) => {
          btn.classList.remove('active');
        });

        // 클릭된 탭에 active 추가
        event.target.classList.add('active');

        // 모든 히스토리 섹션 숨기기
        document.querySelectorAll('.history-section').forEach((section) => {
          section.classList.remove('active');
        });

        // 선택된 카테고리 보이기
        document.getElementById(category).classList.add('active');

        // 스크롤을 맨 위로 이동
        document.querySelector('.content-wrapper').scrollTop = 0;
      }

      // 드롭다운 외부 클릭 시 닫기
      window.addEventListener('click', function (e) {
        const dropdown = document.querySelector('.dropdown');
        const dropdownMenu = document.getElementById('dropdownMenu');

        if (dropdown && !dropdown.contains(e.target)) {
          dropdownMenu?.classList.remove('show');
        }
      });
    </script>
  </body>
</html>
