<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MrJino - 노진일</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      .nav-card {
        transition: all 0.3s ease;
      }

      .nav-card:hover {
        transform: translateY(-8px);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.8s ease-out forwards;
      }

      .delay-1 {
        animation-delay: 0.1s;
        opacity: 0;
      }

      .delay-2 {
        animation-delay: 0.2s;
        opacity: 0;
      }

      .delay-3 {
        animation-delay: 0.3s;
        opacity: 0;
      }

      .delay-4 {
        animation-delay: 0.4s;
        opacity: 0;
      }
    </style>
  </head>
  <body class="bg-white text-gray-950">
    <section class="h-screen flex items-center justify-center">
      <div class="container mx-auto px-6 max-w-6xl">
        <!-- Header -->
        <div class="text-center mb-12 fade-in">
          <div class="flex items-center justify-center gap-3 mb-4">
            <img src="portfolio/res/jino_icon.png" alt="프로필 아이콘" class="w-16 h-16 rounded-2xl object-contain" />
            <h1 class="text-5xl md:text-6xl font-bold text-gray-950">MrJino</h1>
          </div>
          <p class="text-xl text-gray-800">노진일 | Software Engineer</p>
          <p class="text-gray-600 mt-2">Android • iOS • Windows • Web</p>
        </div>

        <!-- Navigation Cards Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <!-- Portfolio Card -->
          <a
            href="portfolio/index.html"
            class="nav-card fade-in delay-1 bg-white rounded-2xl p-4 border border-gray-200 shadow-sm hover:border-gray-950 hover:shadow-lg transition-all group"
          >
            <div class="text-center">
              <div class="mb-4">
                <svg class="w-16 h-16 mx-auto text-gray-950 group-hover:text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                  />
                </svg>
              </div>
              <h2 class="text-2xl font-bold text-gray-950 group-hover:text-black mb-2">Portfolio</h2>
              <p class="text-gray-600 text-sm">경력, 프로젝트, 스킬</p>
            </div>
          </a>

          <!-- Blog Card -->
          <a
            href="blog/index.html"
            class="nav-card fade-in delay-2 bg-white rounded-2xl p-4 border border-gray-200 shadow-sm hover:border-gray-950 hover:shadow-lg transition-all group"
          >
            <div class="text-center">
              <div class="mb-4">
                <svg class="w-16 h-16 mx-auto text-gray-950 group-hover:text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
                  ></path>
                </svg>
              </div>
              <h2 class="text-2xl font-bold text-gray-950 group-hover:text-black mb-2">Blog</h2>
              <p class="text-gray-600 text-sm">기술 블로그</p>
            </div>
          </a>

          <!-- Course Card -->
          <a
            href="course/index.html"
            class="nav-card fade-in delay-3 bg-white rounded-2xl p-4 border border-gray-200 shadow-sm hover:border-gray-950 hover:shadow-lg transition-all group"
          >
            <div class="text-center">
              <div class="mb-4">
                <svg class="w-16 h-16 mx-auto text-gray-950 group-hover:text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 14l9-5-9-5-9 5 9 5z M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"
                  ></path>
                </svg>
              </div>
              <h2 class="text-2xl font-bold text-gray-950 group-hover:text-black mb-2">Course</h2>
              <p class="text-gray-600 text-sm">학습 토픽</p>
            </div>
          </a>

          <!-- History Card -->
          <a
            href="history/index.html"
            class="nav-card fade-in delay-4 bg-white rounded-2xl p-4 border border-gray-200 shadow-sm hover:border-gray-950 hover:shadow-lg transition-all group"
          >
            <div class="text-center">
              <div class="mb-4">
                <svg class="w-16 h-16 mx-auto text-gray-950 group-hover:text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
              </div>
              <h2 class="text-2xl font-bold text-gray-950 group-hover:text-black mb-2">History</h2>
              <p class="text-gray-600 text-sm">타임라인</p>
            </div>
          </a>
        </div>

        <!-- Footer -->
        <div class="text-center mt-12 fade-in delay-4">
          <div class="flex items-center justify-center gap-2 text-gray-500 text-sm">
            <svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
            </svg>
            <span>Made With Claude Code</span>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
