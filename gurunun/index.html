<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gurunun</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        color: #030712;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .page {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .home-layout {
        width: 100%;
        max-width: 72rem;
        margin: 0 auto;
        padding: 0 1rem;
      }

      .home-header {
        text-align: center;
        margin-bottom: 3rem;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .brand-icon {
        display: block;
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 1rem;
        object-fit: contain;
      }

      .brand-title {
        color: #030712;
        font-size: 2.25rem;
        line-height: 2.5rem;
        font-weight: 700;
      }

      .home-cards {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.5rem;
        width: 100%;
        max-width: 28rem;
        margin: 0 auto;
      }

      .nav-card {
        display: block;
        padding: 1rem;
        border: 1px solid #e5e7eb;
        border-radius: 1rem;
        background: #ffffff;
        color: inherit;
        text-decoration: none;
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        transition: all 0.3s ease;
      }

      .nav-card:hover {
        transform: translateY(-8px);
        border-color: #030712;
        box-shadow:
          0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -4px rgba(0, 0, 0, 0.1);
      }

      .nav-card:hover .card-title {
        color: #000000;
      }

      .card-content {
        text-align: center;
      }

      .card-icon-wrap {
        margin-bottom: 1rem;
      }

      .card-icon {
        display: block;
        width: 4rem;
        height: 4rem;
        margin: 0 auto;
      }

      .card-title {
        margin-bottom: 0.5rem;
        color: #030712;
        font-size: 1.5rem;
        line-height: 2rem;
        font-weight: 700;
      }

      .home-footer {
        margin-top: 3rem;
        text-align: center;
      }

      .footer-text {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        color: #6b7280;
        font-size: 0.875rem;
        line-height: 1.25rem;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.8s ease-out forwards;
      }

      .delay-1 {
        animation-delay: 0.1s;
        opacity: 0;
      }

      @media (min-width: 640px) {
        .home-layout {
          padding: 0 1.5rem;
        }

        .brand-icon {
          width: 4rem;
          height: 4rem;
        }

        .home-cards {
          gap: 1.5rem;
        }
      }

      @media (min-width: 768px) {
        .brand-title {
          font-size: 3.75rem;
          line-height: 1;
        }
      }

      @media (max-width: 640px) {
        html,
        body {
          height: 100%;
          overflow-x: hidden;
          overflow-y: hidden;
        }

        .page {
          min-height: 100dvh;
          padding: 1.5rem 0;
        }

        .home-layout {
          min-height: calc(100dvh - 3rem);
          display: grid;
          grid-template-rows: auto 1fr auto;
          align-items: stretch;
        }

        .home-header {
          align-self: start;
          margin-bottom: 0;
        }

        .home-cards {
          align-self: center;
        }

        .home-footer {
          align-self: end;
          margin-top: 0;
        }
      }
    </style>
  </head>
  <body>
    <section class="page">
      <div class="home-layout">
        <div class="home-header fade-in">
          <div class="brand">
            <h1 class="brand-title">Gurunun</h1>
          </div>
        </div>

        <div class="home-cards">
          <a href="https://mrjino.github.io/" class="nav-card fade-in delay-1">
            <div class="card-content">
              <div class="card-icon-wrap">
                <img src="portfolio-user.svg" alt="MrJino 아이콘" class="card-icon" />
              </div>
              <h2 class="card-title">MrJino</h2>
            </div>
          </a>
        </div>

        <div class="home-footer fade-in delay-1">
          <div class="footer-text">
            <span>Made With Claude Code</span>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
