<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MrJino Portfolio</title>
    <link rel="stylesheet" href="../assets/css/tailwind.css" />
    <script src="../assets/components/navigation-dropdown.js" defer></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      .main-container {
        height: calc(100vh - 64px);
        margin-top: 64px;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        scroll-behavior: smooth;
      }

      .section {
        height: calc(100vh - 64px);
        scroll-snap-align: start;
        scroll-snap-stop: always;
      }

      /* Disable scroll snap on mobile */
      @media (max-width: 768px) {
        html,
        body {
          height: 100%;
          overflow: hidden;
        }

        .main-container {
          height: calc(100dvh - 64px);
          scroll-snap-type: none;
        }

        .section {
          height: auto;
          min-height: 0;
          scroll-snap-align: none;
          scroll-snap-stop: normal;
        }

        .section iframe {
          display: block;
          width: 100%;
          min-height: 0;
          overflow: hidden;
        }
      }

      .fade-in {
        animation: fadeIn 1s ease-in;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(0px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .scroll-indicator {
        animation: bounce 2s infinite;
      }

      @keyframes bounce {
        0%,
        20%,
        50%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-10px);
        }
        60% {
          transform: translateY(-5px);
        }
      }

      /* Custom scrollbar */
      .main-container::-webkit-scrollbar {
        width: 8px;
      }

      .main-container::-webkit-scrollbar-track {
        background: #f3f4f6;
      }

      .main-container::-webkit-scrollbar-thumb {
        background: #9ca3af;
        border-radius: 4px;
      }

      .main-container::-webkit-scrollbar-thumb:hover {
        background: #111827;
      }

      /* Dropdown Menu Styles */
      .dropdown {
        position: relative;
      }
      .dropdown-menu {
        display: none;
        position: absolute;
        right: 0;
        top: 100%;
        margin-top: 0.5rem;
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        box-shadow: 0 10px 25px rgba(17, 24, 39, 0.12);
        width: 100%;
        z-index: 100;
      }
      .dropdown-menu.show {
        display: block;
      }
      .dropdown-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        color: #111827;
        text-decoration: none;
        transition: background-color 0.2s;
      }
      .dropdown-item:hover {
        background-color: #f3f4f6;
      }
      .section-dropdown {
        display: none;
        position: relative;
      }
      .section-dropdown-menu {
        display: none;
        position: absolute;
        right: 0;
        top: 100%;
        margin-top: 0.5rem;
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        box-shadow: 0 10px 25px rgba(17, 24, 39, 0.12);
        min-width: 11rem;
        z-index: 100;
      }
      .section-dropdown-menu.show {
        display: block;
      }
      .section-dropdown-item {
        display: block;
        padding: 0.75rem 1rem;
        color: #4b5563;
        text-decoration: none;
        transition:
          background-color 0.2s,
          color 0.2s;
      }
      .section-dropdown-item.active {
        color: #111827;
        font-weight: 600;
      }
      .section-dropdown-item:hover {
        background-color: #f3f4f6;
        color: #111827;
      }

      @media (max-width: 768px) {
        nav .container {
          padding-left: 0.5rem;
          padding-right: 0.5rem;
          padding-top: 0.5rem;
          padding-bottom: 0.5rem;
        }

        nav .flex {
          gap: 0.375rem;
        }

        .main-container {
          margin-top: 56px;
          height: calc(100dvh - 56px);
        }

        .section-nav-links,
        .site-dropdown {
          display: none;
        }

        .section-dropdown {
          display: block;
        }

        .section-dropdown button {
          padding: 0.375rem 0.625rem;
        }
      }
    </style>
  </head>
  <body class="bg-white text-gray-950 font-sans">
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-200">
      <div class="container mx-auto px-6 py-3">
        <div class="flex items-center gap-2">
          <img src="res/jino_icon.png" alt="프로필 아이콘" class="w-10 h-10 rounded-lg object-contain flex-shrink-0" />
          <a href="../index.html" class="text-xl font-bold text-gray-950 hover:text-black transition-colors">MrJino</a>
          <div class="flex-1"></div>
          <div class="flex gap-6 items-center">
            <div class="section-nav-links flex gap-6 items-center">
              <a
                href="#about"
                onclick="
                  scrollToSection(0);
                  return false;
                "
                class="nav-link text-gray-950 font-semibold hover:text-black transition-colors"
                data-section="0"
                >About</a
              >
              <a
                href="#experience"
                onclick="
                  scrollToSection(1);
                  return false;
                "
                class="nav-link text-gray-500 hover:text-gray-950 transition-colors"
                data-section="1"
                >Experience</a
              >
              <a
                href="#projects"
                onclick="
                  scrollToSection(2);
                  return false;
                "
                class="nav-link text-gray-500 hover:text-gray-950 transition-colors"
                data-section="2"
                >Projects</a
              >
              <a
                href="#culture-fit"
                onclick="
                  scrollToSection(3);
                  return false;
                "
                class="nav-link text-gray-500 hover:text-gray-950 transition-colors"
                data-section="3"
                >Culture-Fit</a
              >
              <!--
              <a
                href="#interview"
                onclick="
                  scrollToSection(4);
                  return false;
                "
                class="nav-link text-gray-500 hover:text-gray-950 transition-colors"
                data-section="4"
                >Interview</a
              >
              -->
              <a
                href="#contact"
                onclick="
                  scrollToSection(4);
                  return false;
                "
                class="nav-link text-gray-500 hover:text-gray-950 transition-colors"
                data-section="4"
                >Contact</a
              >
            </div>
            <div class="section-dropdown">
              <button
                onclick="toggleSectionDropdown()"
                class="px-4 py-2 bg-white hover:bg-gray-50 border border-gray-300 hover:border-gray-950 rounded-lg transition-all flex items-center gap-2 text-gray-800 hover:text-black"
              >
                <span id="sectionDropdownLabel">About</span>
                <img src="../assets/icons/chevron-down.svg" alt="" class="w-4 h-4" aria-hidden="true" />
              </button>
              <div id="sectionDropdownMenu" class="section-dropdown-menu">
                <a
                  href="#about"
                  class="section-dropdown-item active"
                  data-section="0"
                  onclick="
                    scrollToSection(0);
                    closeSectionDropdown();
                    return false;
                  "
                  >About</a
                >
                <a
                  href="#experience"
                  class="section-dropdown-item"
                  data-section="1"
                  onclick="
                    scrollToSection(1);
                    closeSectionDropdown();
                    return false;
                  "
                  >Experience</a
                >
                <a
                  href="#projects"
                  class="section-dropdown-item"
                  data-section="2"
                  onclick="
                    scrollToSection(2);
                    closeSectionDropdown();
                    return false;
                  "
                  >Projects</a
                >
                <a
                  href="#culture-fit"
                  class="section-dropdown-item"
                  data-section="3"
                  onclick="
                    scrollToSection(3);
                    closeSectionDropdown();
                    return false;
                  "
                  >Culture-Fit</a
                >
                <!--
                <a
                  href="#interview"
                  class="section-dropdown-item"
                  data-section="4"
                  onclick="
                    scrollToSection(4);
                    closeSectionDropdown();
                    return false;
                  "
                  >Interview</a
                >
                -->
                <a
                  href="#contact"
                  class="section-dropdown-item"
                  data-section="4"
                  onclick="
                    scrollToSection(4);
                    closeSectionDropdown();
                    return false;
                  "
                  >Contact</a
                >
              </div>
            </div>
            <!-- Navigation Dropdown -->
            <div id="navigationDropdown" data-current="portfolio"></div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
      <!-- Section 1: About Me -->
      <section class="section">
        <iframe src="pages/about.html" width="100%" height="100%" frameborder="0"></iframe>
      </section>

      <!-- Section 2: Experience -->
      <section class="section">
        <iframe src="pages/experience.html" width="100%" height="100%" frameborder="0"></iframe>
      </section>

      <!-- Section 3: Projects -->
      <section class="section">
        <iframe src="pages/projects.html" width="100%" height="100%" frameborder="0"></iframe>
      </section>

      <!-- Section 4: Culture-Fit -->
      <section class="section">
        <iframe src="pages/culture-fit.html" width="100%" height="100%" frameborder="0"></iframe>
      </section>

      <!--
      Section 5: Interview
      <section class="section">
        <iframe src="pages/interview.html" width="100%" height="100%" frameborder="0"></iframe>
      </section>
      -->

      <!-- Section 6: Contact -->
      <section class="section">
        <iframe src="pages/contact.html" width="100%" height="100%" frameborder="0"></iframe>
      </section>
    </div>

    <script>
      const sections = document.querySelectorAll('.section');
      const navLinks = document.querySelectorAll('.nav-link');
      const mainContainer = document.querySelector('.main-container');
      const portfolioIframes = document.querySelectorAll('.section iframe');
      const sectionDropdownLabel = document.getElementById('sectionDropdownLabel');
      const sectionDropdownItems = document.querySelectorAll('.section-dropdown-item');

      function isMobileLayout() {
        return window.matchMedia('(max-width: 768px)').matches;
      }

      function resizePortfolioIframes() {
        portfolioIframes.forEach((iframe) => {
          const section = iframe.closest('.section');

          if (!isMobileLayout()) {
            iframe.style.height = '100%';
            if (section) section.style.minHeight = '';
            return;
          }

          try {
            const iframeDocument = iframe.contentDocument || iframe.contentWindow.document;
            const iframeHeight = Math.max(iframeDocument.documentElement.scrollHeight, iframeDocument.body.scrollHeight);
            iframe.style.height = `${iframeHeight}px`;
            if (section) section.style.minHeight = `${iframeHeight}px`;
          } catch (error) {
            iframe.style.height = '100vh';
          }
        });
      }

      portfolioIframes.forEach((iframe) => {
        iframe.addEventListener('load', resizePortfolioIframes);
      });

      window.addEventListener('resize', resizePortfolioIframes);
      resizePortfolioIframes();

      function scrollToSection(index) {
        const section = sections[index];
        if (section) {
          const sectionTop = section.offsetTop;
          mainContainer.scrollTo({
            top: sectionTop,
            behavior: 'smooth',
          });
        }
      }

      function updateActiveNav() {
        const scrollPosition = mainContainer.scrollTop;
        const containerHeight = mainContainer.clientHeight;

        sections.forEach((section, index) => {
          const sectionTop = section.offsetTop;
          const sectionHeight = section.offsetHeight;

          if (scrollPosition >= sectionTop - containerHeight / 2 && scrollPosition < sectionTop + sectionHeight - containerHeight / 2) {
            navLinks.forEach((link) => {
              link.classList.remove('text-gray-950', 'font-semibold');
              link.classList.add('text-gray-500');
            });

            if (navLinks[index]) {
              navLinks[index].classList.remove('text-gray-500');
              navLinks[index].classList.add('text-gray-950', 'font-semibold');
            }

            sectionDropdownItems.forEach((item) => {
              item.classList.toggle('active', item.dataset.section === String(index));
            });

            if (sectionDropdownLabel && sectionDropdownItems[index]) {
              sectionDropdownLabel.textContent = sectionDropdownItems[index].textContent;
            }
          }
        });
      }

      mainContainer.addEventListener('scroll', updateActiveNav);
      updateActiveNav();
    </script>
    <script>
      function toggleSectionDropdown() {
        document.getElementById('sectionDropdownMenu').classList.toggle('show');
      }

      function closeSectionDropdown() {
        document.getElementById('sectionDropdownMenu').classList.remove('show');
      }

      // Close dropdown when clicking outside
      window.addEventListener('click', function (e) {
        const dropdown = document.querySelector('.dropdown');
        const dropdownMenu = document.getElementById('dropdownMenu');
        const sectionDropdown = document.querySelector('.section-dropdown');

        if (dropdown && !dropdown.contains(e.target)) {
          dropdownMenu?.classList.remove('show');
        }

        if (sectionDropdown && !sectionDropdown.contains(e.target)) {
          closeSectionDropdown();
        }
      });
    </script>
  </body>
</html>
