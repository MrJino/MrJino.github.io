<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog</title>
    <link rel="stylesheet" href="../assets/css/tailwind.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="../assets/components/navigation-dropdown.js" defer></script>
    <style>
      .dropdown {
        position: relative;
      }
      .dropdown-menu {
        display: none;
        position: absolute;
        right: 0;
        top: 100%;
        margin-top: 0.5rem;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 100%;
        z-index: 100;
      }
      .dropdown-menu.show {
        display: block;
      }
      .dropdown-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        color: #374151;
        text-decoration: none;
        transition: background-color 0.2s;
      }
      .dropdown-item:hover {
        background-color: #f3f4f6;
      }

      @media (max-width: 768px) {
        nav .container {
          padding-left: 0.5rem;
          padding-right: 0.5rem;
          padding-top: 0.5rem;
          padding-bottom: 0.5rem;
        }

        .blog-search {
          display: none;
        }
      }
    </style>
  </head>
  <body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-200">
      <div class="container mx-auto px-6 py-3">
        <div class="flex items-center gap-2">
          <img src="images/jino_icon.png" alt="프로필 아이콘" class="w-8 h-8 rounded-lg object-contain flex-shrink-0" />
          <a href="../index.html" class="text-xl font-bold text-gray-950 hover:text-black transition-colors">MrJino</a>
          <div class="flex-1"></div>
          <div class="flex gap-6 items-center">
            <!-- Search -->
            <div class="blog-search relative">
              <input
                type="text"
                id="searchInput"
                placeholder="블로그 검색..."
                class="w-64 px-4 py-2 pr-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                oninput="searchPosts(this.value)"
              />
              <svg class="w-5 h-5 absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
            </div>
            <!-- Navigation Dropdown -->
            <div id="navigationDropdown" data-current="blog"></div>
          </div>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-8">
      <div class="flex gap-8">
        <!-- Sidebar - Categories -->
        <aside class="w-64 flex-shrink-0">
          <div class="bg-white rounded-lg shadow-sm border border-gray-200 sticky top-24">
            <div class="p-4 border-b border-gray-200">
              <h2 class="text-lg font-bold text-gray-900">카테고리</h2>
            </div>
            <nav id="categoryNav" class="p-2">
              <!-- Categories will be loaded here -->
            </nav>
          </div>
        </aside>

        <!-- Main Content - Blog Grid -->
        <main class="flex-1">
          <!-- Category Title -->
          <div class="mb-6">
            <h2 id="categoryTitle" class="text-3xl font-bold text-gray-900">전체 글</h2>
            <p id="categoryCount" class="text-gray-600 mt-2">12개의 글</p>
          </div>

          <!-- Blog Grid -->
          <div id="blogGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Blog cards will be loaded here -->
          </div>

          <!-- Empty State -->
          <div id="emptyState" class="hidden text-center py-16">
            <svg class="w-16 h-16 mx-auto text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            <p class="text-gray-500 text-lg">검색 결과가 없습니다</p>
          </div>
        </main>
      </div>
    </div>

    <script src="js/blog-data.js"></script>
    <script src="js/main.js"></script>
    <script>
      // Close dropdown when clicking outside
      window.addEventListener('click', function (e) {
        const dropdown = document.querySelector('.dropdown');
        const dropdownMenu = document.getElementById('dropdownMenu');

        if (dropdown && !dropdown.contains(e.target)) {
          dropdownMenu?.classList.remove('show');
        }
      });
    </script>
  </body>
</html>
