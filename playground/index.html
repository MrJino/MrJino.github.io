<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground</title>
    <link rel="stylesheet" href="../assets/css/tailwind.css" />
    <link rel="stylesheet" href="./style.css" />
    <script src="../assets/components/navigation-dropdown.js" defer></script>
  </head>
  <body>
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-200">
      <div class="container mx-auto px-6 py-3">
        <div class="flex items-center gap-2">
          <img src="../portfolio/res/jino_icon.png" alt="프로필 아이콘" class="w-10 h-10 rounded-lg object-contain flex-shrink-0" />
          <a href="../" class="text-xl font-bold text-gray-950 hover:text-black transition-colors">MrJino</a>
          <div class="flex-1"></div>
          <div class="flex gap-6 items-center">
            <div id="navigationDropdown" data-current="playground"></div>
          </div>
        </div>
      </div>
    </nav>

    <main class="page">
      <div class="page-inner">
        <section class="app-grid" aria-label="앱 메뉴">
          <a class="app-card fade-in delay-1" href="https://play.gurunun.me/pick-your-favorite/">
            <div>
              <div class="app-card__icon">P</div>
              <h2 class="app-card__title">Pick your favorite</h2>
              <p class="app-card__desc">카드를 골라 최종 후보를 만드는 월드컵형 선택 게임입니다.</p>
            </div>
            <div class="app-card__meta">열기</div>
          </a>

          <a class="app-card fade-in delay-2" href="https://play.gurunun.me/typing-game/">
            <div>
              <div class="app-card__icon">T</div>
              <h2 class="app-card__title">Typing game</h2>
              <p class="app-card__desc">떨어지는 글자와 단어를 입력해 미사일로 격추하는 타자 연습 게임입니다.</p>
            </div>
            <div class="app-card__meta">열기</div>
          </a>

          <a class="app-card fade-in delay-3" href="https://play.gurunun.me/words-quiz/">
            <div>
              <div class="app-card__icon">W</div>
              <h2 class="app-card__title">Words quiz</h2>
              <p class="app-card__desc">단어의 약자를 보고 전체 단어를 맞추는 퀴즈 게임</p>
            </div>
            <div class="app-card__meta">열기</div>
          </a>
        </section>
      </div>
    </main>

    <script>
      window.addEventListener('click', function (event) {
        const dropdown = document.querySelector('.dropdown');
        const dropdownMenu = document.getElementById('dropdownMenu');

        if (dropdown && !dropdown.contains(event.target)) {
          dropdownMenu?.classList.remove('show');
        }
      });
    </script>
  </body>
</html>
