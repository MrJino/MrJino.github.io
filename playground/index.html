<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground</title>
    <link rel="stylesheet" href="../assets/css/tailwind.css" />
    <script src="../assets/components/navigation-dropdown.js" defer></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        color-scheme: light;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        background: #ffffff;
        color: #111827;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .dropdown {
        position: relative;
      }

      .dropdown-menu {
        display: none;
        position: absolute;
        right: 0;
        top: 100%;
        margin-top: 0.5rem;
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        box-shadow: 0 10px 25px rgba(17, 24, 39, 0.12);
        width: 100%;
        z-index: 100;
      }

      .dropdown-menu.show {
        display: block;
      }

      .dropdown-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        color: #111827;
        text-decoration: none;
        transition: background-color 0.2s;
      }

      .dropdown-item:hover {
        background-color: #f3f4f6;
      }

      .page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6rem 1.5rem 3rem;
      }

      .page-inner {
        width: 100%;
        max-width: 72rem;
        margin: 0 auto;
      }

      .header {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(18rem, 1fr);
        align-items: end;
        gap: 2rem;
        margin-bottom: 2rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid #e5e7eb;
      }

      .eyebrow {
        margin-bottom: 0.5rem;
        color: #6b7280;
        font-size: 0.875rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .header h1 {
        color: #111827;
        font-size: clamp(2.5rem, 7vw, 4.5rem);
        line-height: 1;
        font-weight: 800;
      }

      .header > p {
        color: #4b5563;
        font-size: 1rem;
        line-height: 1.7;
      }

      .app-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1.5rem;
      }

      .app-card {
        display: flex;
        min-height: 16rem;
        flex-direction: column;
        justify-content: space-between;
        gap: 2rem;
        padding: 1.5rem;
        border: 1px solid #e5e7eb;
        border-radius: 1rem;
        background: #ffffff;
        color: #111827;
        box-shadow: 0 1px 2px rgba(17, 24, 39, 0.05);
        text-decoration: none;
        transition:
          border-color 0.3s ease,
          box-shadow 0.3s ease,
          transform 0.3s ease;
      }

      .app-card:hover {
        border-color: #111827;
        box-shadow:
          0 10px 15px -3px rgba(17, 24, 39, 0.1),
          0 4px 6px -4px rgba(17, 24, 39, 0.1);
        transform: translateY(-8px);
      }

      .app-card__icon {
        display: grid;
        width: 2.5rem;
        height: 2.5rem;
        margin-bottom: 1.25rem;
        place-items: center;
        border: 1px solid #111827;
        border-radius: 0.5rem;
        background: #111827;
        color: #ffffff;
        font-weight: 800;
      }

      .app-card__title {
        margin-bottom: 0.5rem;
        font-size: 1.375rem;
        line-height: 1.3;
        font-weight: 800;
      }

      .app-card__desc {
        color: #4b5563;
        font-size: 0.95rem;
        line-height: 1.65;
      }

      .app-card__meta {
        color: #111827;
        font-size: 0.875rem;
        font-weight: 700;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.8s ease-out forwards;
      }

      .delay-1 {
        animation-delay: 0.1s;
        opacity: 0;
      }

      .delay-2 {
        animation-delay: 0.2s;
        opacity: 0;
      }

      @media (max-width: 768px) {
        nav .container {
          padding-left: 0.5rem;
          padding-right: 0.5rem;
          padding-top: 0.5rem;
          padding-bottom: 0.5rem;
        }

        .page {
          padding: 5rem 0.5rem 2rem;
        }

        .header {
          grid-template-columns: 1fr;
          gap: 1rem;
          margin-bottom: 1rem;
        }

        .app-grid {
          grid-template-columns: 1fr;
          gap: 0.75rem;
        }

        .app-card {
          min-height: 12rem;
          padding: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-200">
      <div class="container mx-auto px-6 py-3">
        <div class="flex items-center gap-2">
          <img src="../portfolio/res/jino_icon.png" alt="프로필 아이콘" class="w-8 h-8 rounded-lg object-contain flex-shrink-0" />
          <a href="../index.html" class="text-xl font-bold text-gray-950 hover:text-black transition-colors">MrJino</a>
          <div class="flex-1"></div>
          <div class="flex gap-6 items-center">
            <div id="navigationDropdown" data-current="playground"></div>
          </div>
        </div>
      </div>
    </nav>

    <main class="page">
      <div class="page-inner">
        <section class="app-grid" aria-label="앱 메뉴">
          <a class="app-card fade-in delay-1" href="https://play.gurunun.me/pick-your-favorite/">
            <div>
              <div class="app-card__icon">P</div>
              <h2 class="app-card__title">Pick your favorite</h2>
              <p class="app-card__desc">카드를 골라 최종 후보를 만드는 월드컵형 선택 게임입니다.</p>
            </div>
            <div class="app-card__meta">열기</div>
          </a>

          <a class="app-card fade-in delay-2" href="https://play.gurunun.me/typing-game/">
            <div>
              <div class="app-card__icon">T</div>
              <h2 class="app-card__title">Typing game</h2>
              <p class="app-card__desc">떨어지는 글자와 단어를 입력해 미사일로 격추하는 타자 연습 게임입니다.</p>
            </div>
            <div class="app-card__meta">열기</div>
          </a>
        </section>
      </div>
    </main>

    <script>
      window.addEventListener('click', function (event) {
        const dropdown = document.querySelector('.dropdown');
        const dropdownMenu = document.getElementById('dropdownMenu');

        if (dropdown && !dropdown.contains(event.target)) {
          dropdownMenu?.classList.remove('show');
        }
      });
    </script>
  </body>
</html>
