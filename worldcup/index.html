<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>32 Card Picker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="pool-scroll">
          <div class="pool-grid" id="poolGrid"></div>
        </div>
      </header>

      <section class="content-layout">
        <aside class="menu-panel">
          <div class="menu-panel__title">Menu</div>

          <div class="menu-section">
            <button class="menu-group is-open" type="button" data-menu-toggle aria-expanded="true" aria-controls="submenu-1990s">
              <span>1990년대</span>
              <span class="menu-arrow">+</span>
            </button>
            <div class="submenu is-open" id="submenu-1990s">
              <button class="submenu-item" type="button">댄스가수</button>
              <button class="submenu-item" type="button">발라드가수</button>
            </div>
          </div>

          <div class="menu-section">
            <button class="menu-group" type="button" data-menu-toggle aria-expanded="false" aria-controls="submenu-2000s">
              <span>2000년대</span>
              <span class="menu-arrow">+</span>
            </button>
            <div class="submenu" id="submenu-2000s"></div>
          </div>
        </aside>

        <section class="battle-panel">
          <div class="battle-top">
            <h2 id="battleTitle">Random 2 Card Match</h2>
            <div class="progress" id="progressText">0 / 16 selected</div>
          </div>

          <div class="battle-grid" id="battleGrid">
            <article class="battle-card" data-side="left" id="leftCard" role="button" tabindex="0">
              <span class="label">LEFT</span>
              <h3 id="leftTitle"></h3>
              <p id="leftText"></p>
              <div class="cta">Choose this card</div>
            </article>

            <article class="battle-card" data-side="right" id="rightCard" role="button" tabindex="0">
              <span class="label">RIGHT</span>
              <h3 id="rightTitle"></h3>
              <p id="rightText"></p>
              <div class="cta">Choose this card</div>
            </article>
          </div>

          <p class="center-note" id="centerNote">Click a card to build your final 16.</p>
          <div class="result-banner" id="resultBanner" hidden>Selection complete. Final 16 cards are ready.</div>
        </section>

        <aside class="history-panel">
          <div class="history-panel__top">
            <div>
              <div class="history-panel__eyebrow">LocalStorage</div>
              <h2 class="history-panel__title">Final Cards</h2>
            </div>
            <button class="history-panel__clear" id="clearHistoryButton" type="button">전체삭제</button>
          </div>
          <div class="history-list" id="historyList"></div>
        </aside>
      </section>
    </main>

    <div class="confirm-modal" id="confirmModal" hidden>
      <div class="confirm-modal__backdrop" data-close-confirm-modal></div>
      <div class="confirm-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle" aria-describedby="confirmModalMessage">
        <h2 class="confirm-modal__title" id="confirmModalTitle">삭제 확인</h2>
        <p class="confirm-modal__message" id="confirmModalMessage">정말 삭제하시겠습니까?</p>
        <div class="confirm-modal__actions">
          <button class="confirm-modal__button confirm-modal__button--secondary" id="cancelConfirmButton" type="button">아니오</button>
          <button class="confirm-modal__button confirm-modal__button--primary" id="acceptConfirmButton" type="button">예</button>
        </div>
      </div>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
